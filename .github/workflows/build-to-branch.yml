name: Build and Push to Build Branch

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  # Build should not connect to Postgres. This sentinel URL fails fast if a
  # future change reintroduces build-time database access.
  DATABASE_URL: postgres://build:build@127.0.0.1:1/build
  NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL }}
  NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Load environment variables as defaults
        shell: bash
        run: |
          while IFS='=' read -r key value || [ -n "$key" ]; do
            # 1. Ignore comments and empty lines
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue

            # 2. Trim whitespace from key and value
            key="${key#"${key%%[![:space:]]*}"}"
            key="${key%"${key##*[![:space:]]}"}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"

            # 3. Check if the environment variable already exists
            # If the key already has a value (from YAML top-level env), skip it
            if [ -z "${!key}" ]; then
              echo "Setting default: $key=$value"
              echo "$key=$value" >> $GITHUB_ENV
            else
              echo "Skipping $key: Using value from YAML override"
            fi
          done < .env.example

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare "$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).packageManager.split('+')[0]")" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next
        run: pnpm build

      - name: Prepare build branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Copy .next but exclude cache
          # rsync -av --exclude='cache' .next/ /tmp/next-build/
          rm -rf .next/cache
          mkdir -p /tmp/next-build
          cp -r .next/* /tmp/next-build/
          # copy public directory
          mkdir -p /tmp/next-public
          cp -r public/* /tmp/next-public/

          # Switch to or create build branch
          git checkout -B build

          # Clear branch
          git rm -rf .

          # Copy build artifacts in (modify as needed)
          # rsync -av /tmp/next-build/ .next/
          rm -rf .next
          mkdir -p .next
          cp -r /tmp/next-build/* .next/
          rm -rf public
          mkdir -p public
          cp -r /tmp/next-public/* public/

          git add .next
          git add public
          git commit -m "chore: build from $GITHUB_SHA"
          git push -f origin build
