name: '💎 Build and Push Standalone Image'

on:
  push:
    branches:
      - main
    # Only trigger this workflow when files in the following paths change
    paths:
      # Next / App
      - 'src/**'
      - 'public/**'
      - 'messages/**'
      # Docker / Infra
      - 'docker/**'
      - 'docker-compose.prod.yml'
      # Build & Tooling
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'next.config.*'
      - 'next-sitemap.config.*'
      - 'redirects.js'
      - 'tailwind.config.mjs'
      - 'postcss.config.js'
      - 'tsconfig.json'
      - 'components.json'
      - 'scripts/**'
      - '.github/**'
      # Env template
      - '.env.example'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  # Build should not connect to Postgres. This sentinel URL fails fast if a
  # future change reintroduces build-time database access.
  DATABASE_URL: postgres://build:build@127.0.0.1:1/build
  AWS_OIDC_ROLE: ${{ vars.AWS_OIDC_ROLE }}
  AWS_ECR_REGISTRY: ${{ vars.AWS_ECR_REGISTRY }}
  NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL }}
  NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    # runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Load environment variables as defaults
        shell: bash
        run: |
          while IFS='=' read -r key value || [ -n "$key" ]; do
            # 1. Ignore comments and empty lines
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue

            # 2. Trim whitespace from key and value
            key="${key#"${key%%[![:space:]]*}"}"
            key="${key%"${key##*[![:space:]]}"}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"

            # 3. Check if the environment variable already exists
            # If the key already has a value (from YAML top-level env), skip it
            if [ -z "${!key}" ]; then
              echo "Setting default: $key=$value"
              echo "$key=$value" >> $GITHUB_ENV
            else
              echo "Skipping $key: Using value from YAML override"
            fi
          done < .env.example

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE }}
          aws-region: us-east-1 # Public ECR is fixed to this region

      - name: Log in to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Check .dockerignore
        run: |
          if [ -f ".dockerignore" ]; then
            echo "==== .dockerignore content ===="
            cat .dockerignore
          else
            echo "No .dockerignore file found."
          fi

      - name: Validate public build variables
        shell: bash
        run: |
          if [ -z "$NEXT_PUBLIC_SERVER_URL" ]; then
            echo "NEXT_PUBLIC_SERVER_URL is required for the standalone production image."
            exit 1
          fi

          if [[ "$NEXT_PUBLIC_SERVER_URL" == *"localhost"* || "$NEXT_PUBLIC_SERVER_URL" == *"127.0.0.1"* ]]; then
            echo "NEXT_PUBLIC_SERVER_URL must be the production URL, got: $NEXT_PUBLIC_SERVER_URL"
            exit 1
          fi

          if [ -z "$NEXT_PUBLIC_SITE_NAME" ]; then
            echo "NEXT_PUBLIC_SITE_NAME is required for the standalone production image."
            exit 1
          fi

          echo "NEXT_PUBLIC_SERVER_URL=$NEXT_PUBLIC_SERVER_URL"
          echo "NEXT_PUBLIC_SITE_NAME=$NEXT_PUBLIC_SITE_NAME"

      - name: Build and Push Docker image
        run: |
          # 1. Extract Short SHA
          SHORT_SHA=${GITHUB_SHA:0:7}
          REGISTRY=$AWS_ECR_REGISTRY

          # 2. Build image
          docker build -f docker/Dockerfile.prod.standalone \
            --build-arg DATABASE_URL="$DATABASE_URL" \
            --build-arg NEXT_PUBLIC_SERVER_URL="$NEXT_PUBLIC_SERVER_URL" \
            --build-arg NEXT_PUBLIC_SITE_NAME="$NEXT_PUBLIC_SITE_NAME" \
            --build-arg S3_ENDPOINT="$S3_ENDPOINT" \
            -t $REGISTRY:latest \
            -t $REGISTRY:${SHORT_SHA} .

          # 3. Push image
          docker push $REGISTRY:latest
          docker push $REGISTRY:${SHORT_SHA}
