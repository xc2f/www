name: '🚀 Build and Push Dev Image'

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  # Build should not connect to Postgres. This sentinel URL fails fast if a
  # future change reintroduces build-time database access.
  DATABASE_URL: postgres://build:build@127.0.0.1:1/build
  AWS_OIDC_ROLE: ${{ vars.AWS_OIDC_ROLE }}
  AWS_ECR_REGISTRY: ${{ vars.AWS_ECR_REGISTRY }}
  NEXT_PUBLIC_SERVER_URL: ${{ vars.NEXT_PUBLIC_SERVER_URL }}
  NEXT_PUBLIC_SITE_NAME: ${{ vars.NEXT_PUBLIC_SITE_NAME }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    # runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Load environment variables as defaults
        shell: bash
        run: |
          while IFS='=' read -r key value || [ -n "$key" ]; do
            # 1. Ignore comments and empty lines
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue

            # 2. Trim whitespace from key and value
            key="${key#"${key%%[![:space:]]*}"}"
            key="${key%"${key##*[![:space:]]}"}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"

            # 3. Check if the environment variable already exists
            # If the key already has a value (from YAML top-level env), skip it
            if [ -z "${!key}" ]; then
              echo "Setting default: $key=$value"
              echo "$key=$value" >> $GITHUB_ENV
            else
              echo "Skipping $key: Using value from YAML override"
            fi
          done < .env.example

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare "$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).packageManager.split('+')[0]")" --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next
        run: pnpm build

      - name: Prepare .dockerignore for Dev
        run: |
          # Include node_modules and all source code in the image
          echo ".git" > .dockerignore
          echo ".gitignore" >> .dockerignore
          echo ".next/cache" >> .dockerignore
          echo ".env" >> .dockerignore
          echo ".env.*" >> .dockerignore
          echo "uploads" >> .dockerignore
          echo "media" >> .dockerignore
          echo "node_modules" >> .dockerignore
          echo ".pnpm-store" >> .dockerignore
          echo "node_modules/.cache" >> .dockerignore
          echo "npm-debug.log*" >> .dockerignore
          echo "pnpm-debug.log*" >> .dockerignore
          echo ".DS_Store" >> .dockerignore
          echo "==== Current .dockerignore ===="
          cat .dockerignore

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE }}
          aws-region: us-east-1 # Public ECR is fixed to this region

      - name: Log in to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Docker image (ARM64 only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.prod
          push: true
          tags: ${{ env.AWS_ECR_REGISTRY }}:dev-latest
          # Key: Enable GitHub Actions cache optimization
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Explicitly specify platform
          platforms: linux/arm64
          # platforms: linux/amd64
          provenance: false # Disable provenance (eliminate 0.01MB image)
          sbom: false # Disable Software Bill of Materials (SBOM)
